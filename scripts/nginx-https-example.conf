# Nginx 示例：前端 HTTPS + 同域 /api 反向代理到后端
# 使用前请替换：server_name、ssl_certificate*、root、proxy_pass（若后端非本机 8000）
# 放置位置建议：/etc/nginx/sites-available/ 或 /etc/nginx/conf.d/

server {
    listen 443 ssl http2;
    server_name netops.example.com;   # 替换为实际域名

    # 证书（替换为实际路径；Let's Encrypt 常用 /etc/letsencrypt/live/<domain>/fullchain.pem）
    ssl_certificate     /path/to/fullchain.pem;
    ssl_certificate_key /path/to/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 前端静态资源（替换为实际前端 build 目录）
    root /path/to/netops-frontend/build;
    index index.html;

    # 同域 /api 转发到后端，不修改前端请求语义
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 路由：非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 可选：HTTP 重定向到 HTTPS
